<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .tool-list {
            list-style: none;
        }
        .tool-item {
            background: #fff;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .tool-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .tool-item a {
            display: block;
            padding: 20px 25px;
            color: #333;
            text-decoration: none;
            font-size: 1.1rem;
        }
        .tool-item a::before {
            content: "🔧";
            margin-right: 10px;
        }
        .tool-desc {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
            margin-left: 32px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧰 我的工具箱</h1>
        <p class="subtitle">点击下方工具开始使用</p>
        <ul class="tool-list">
            <li class="tool-item">
                <a href="link_fetcher.html">
                    批量链接执行器
                    <span class="tool-desc">粘贴多个链接，批量执行并查看结果</span>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
